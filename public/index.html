<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MITA — Machine Intelligence Thinking Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#020509;--bg1:#060f1a;--bg2:#0a1828;--bg3:#0d2040;--cyan:#00d4ff;--cyan2:#00aacc;--blue:#0055ff;--green:#00ff88;--red:#ff3355;--t1:#e8f4ff;--t2:#6a9fd8;--t3:#2a4a6b;--border:#0f2a4a;--border2:rgba(0,212,255,0.2);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--t1);display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(0,80,255,.1) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(0,180,255,.07) 0%,transparent 50%);pointer-events:none;z-index:0;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes typeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotPulse{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
.screen{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.screen.hidden{display:none;}
.auth-box{background:var(--bg1);border:1px solid var(--border);width:440px;padding:48px;position:relative;overflow:hidden;animation:slideUp .4s ease;}
.auth-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scan 3s linear infinite;}
.auth-logo{text-align:center;margin-bottom:32px;}
.auth-eye{width:56px;height:56px;margin:0 auto 12px;}
.auth-title{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;letter-spacing:6px;color:var(--cyan);text-shadow:0 0 30px rgba(0,212,255,.5);}
.auth-sub{font-size:9px;letter-spacing:3px;color:var(--t2);margin-top:4px;text-transform:uppercase;}
.auth-tabs{display:flex;margin-bottom:28px;border:1px solid var(--border);overflow:hidden;}
.auth-tab{flex:1;background:transparent;border:none;color:var(--t3);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;padding:10px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.auth-tab.active{background:var(--cyan);color:var(--bg);font-weight:600;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:9px;letter-spacing:2px;color:var(--t2);margin-bottom:5px;text-transform:uppercase;}
.field input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:13px;padding:11px 14px;outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan),0 0 16px rgba(0,212,255,.1);}
.field input::placeholder{color:var(--t3);}
.auth-btn{width:100%;background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:4px;padding:13px;cursor:pointer;transition:all .2s;text-transform:uppercase;margin-top:4px;}
.auth-btn:hover{background:var(--cyan);color:var(--bg);box-shadow:0 0 30px rgba(0,212,255,.4);}
.auth-msg{font-size:10px;text-align:center;margin-top:14px;min-height:16px;letter-spacing:1px;}
.auth-msg.error{color:var(--red);}
.auth-msg.success{color:var(--green);}
.auth-note{text-align:center;font-size:9px;color:var(--t3);margin-top:16px;letter-spacing:1px;}
#app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1;}
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan)22,transparent);}
.h-brand{display:flex;align-items:center;gap:10px;}
.h-eye{width:24px;height:24px;}
.h-name{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;letter-spacing:4px;color:var(--cyan);text-shadow:0 0 20px rgba(0,212,255,.4);}
.h-ver{font-size:8px;letter-spacing:2px;color:var(--t3);margin-left:2px;align-self:flex-end;margin-bottom:1px;}
.h-status{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--t2);letter-spacing:1px;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
.h-user{display:flex;align-items:center;gap:8px;}
.h-avatar{width:28px;height:28px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0;}
.h-username{font-size:10px;color:var(--t2);letter-spacing:1px;}
.icon-btn{background:transparent;border:1px solid var(--border);color:var(--t2);width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px;}
.icon-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.icon-btn.danger:hover{border-color:var(--red);color:var(--red);}
.layout{display:flex;flex:1;overflow:hidden;}
aside{width:230px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.sb-header{padding:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sb-title{font-size:8px;letter-spacing:3px;color:var(--t3);text-transform:uppercase;}
.new-btn{background:transparent;border:1px solid var(--border);color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;padding:4px 8px;cursor:pointer;transition:all .2s;}
.new-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.sb-search{padding:8px 12px;border-bottom:1px solid var(--border);}
.sb-search input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;outline:none;transition:border-color .2s;}
.sb-search input:focus{border-color:var(--cyan);}
.sb-search input::placeholder{color:var(--t3);}
.sb-list{flex:1;overflow-y:auto;padding:6px;}
.sb-list::-webkit-scrollbar{width:2px;}
.sb-list::-webkit-scrollbar-thumb{background:var(--border);}
.hist-item{padding:8px 10px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:all .15s;position:relative;}
.hist-item:hover{background:var(--bg2);border-color:var(--border);}
.hist-item.active{background:var(--bg2);border-color:var(--border2);}
.hist-item-title{font-size:10px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:44px;}
.hist-item.active .hist-item-title{color:var(--t1);}
.hist-item-time{font-size:8px;color:var(--t3);margin-top:2px;}
.hist-actions{position:absolute;right:6px;top:50%;transform:translateY(-50%);display:none;gap:3px;}
.hist-item:hover .hist-actions{display:flex;}
.hist-act-btn{background:transparent;border:none;color:var(--t3);cursor:pointer;font-size:11px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;transition:color .2s;}
.hist-act-btn:hover{color:var(--red);}
.hist-act-btn.view-btn:hover{color:var(--cyan);}
.sb-footer{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sb-user-info{flex:1;min-width:0;}
.sb-user-name{font-size:10px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-user-email{font-size:8px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-msgs{flex:1;overflow-y:auto;padding:28px 0;}
.chat-msgs::-webkit-scrollbar{width:2px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px;text-align:center;}
.w-title{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;letter-spacing:8px;color:var(--cyan);text-shadow:0 0 40px rgba(0,212,255,.4);margin-bottom:6px;}
.w-sub{font-size:10px;letter-spacing:3px;color:var(--t2);margin-bottom:8px;}
.w-greeting{font-size:12px;color:var(--t2);margin-bottom:32px;letter-spacing:1px;}
.suggestions{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:500px;width:100%;}
.sug{background:var(--bg1);border:1px solid var(--border);padding:12px;cursor:pointer;text-align:left;transition:all .2s;}
.sug:hover{border-color:var(--cyan);box-shadow:0 0 16px rgba(0,212,255,.1);transform:translateY(-1px);}
.sug-icon{font-size:16px;margin-bottom:4px;}
.sug-text{font-size:10px;color:var(--t2);line-height:1.4;}
.msg-wrap{max-width:800px;margin:0 auto;padding:0 24px;animation:typeIn .25s ease;}
.msg{display:flex;gap:12px;margin-bottom:24px;}
.msg-av{width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;}
.msg-av.mita{background:linear-gradient(135deg,#001a33,#003366);border:1px solid rgba(0,212,255,.3);}
.msg-av.user{background:linear-gradient(135deg,var(--blue),var(--cyan));}
.msg-body{flex:1;}
.msg-head{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.msg-name{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;}
.msg-name.mita{color:var(--cyan);}
.msg-name.user{color:var(--t2);}
.msg-time{font-size:8px;color:var(--t3);letter-spacing:1px;}
.msg-text{font-size:13px;line-height:1.75;color:var(--t1);}
.msg-text p{margin-bottom:8px;}
.msg-text ul,.msg-text ol{padding-left:20px;margin-bottom:8px;}
.msg-text li{margin-bottom:3px;}
.msg-text strong{color:var(--cyan);font-weight:600;}
.msg-text em{color:var(--t2);font-style:italic;}
.msg-text code{background:var(--bg2);border:1px solid var(--border);padding:1px 5px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);}
.msg-text pre{background:var(--bg2);border:1px solid var(--border);border-left:2px solid var(--cyan);padding:14px;margin:10px 0;overflow-x:auto;font-size:11px;line-height:1.6;position:relative;}
.msg-text pre code{background:none;border:none;padding:0;color:var(--t1);font-size:11px;}
.copy-btn{position:absolute;top:6px;right:6px;background:var(--bg3);border:1px solid var(--border);color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;padding:3px 7px;cursor:pointer;transition:all .2s;}
.copy-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.typing-ind{display:flex;gap:4px;align-items:center;padding:3px 0;}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:dotPulse 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
.input-area{border-top:1px solid var(--border);padding:16px 20px;background:var(--bg1);position:relative;}
.input-area::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan)22,transparent);}
.input-wrap{max-width:800px;margin:0 auto;display:flex;gap:8px;align-items:flex-end;}
textarea{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:13px;padding:12px 14px;outline:none;resize:none;min-height:44px;max-height:160px;line-height:1.5;transition:border-color .2s,box-shadow .2s;}
textarea::placeholder{color:var(--t3);}
textarea:focus{border-color:rgba(0,212,255,.4);box-shadow:0 0 0 1px rgba(0,212,255,.15);}
.send-btn{width:44px;height:44px;background:var(--cyan);border:none;color:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.send-btn:hover{background:white;box-shadow:0 0 20px rgba(0,212,255,.5);}
.send-btn:disabled{background:var(--border);color:var(--t3);cursor:not-allowed;box-shadow:none;}
.send-btn svg{width:16px;height:16px;}
.input-footer{max-width:800px;margin:6px auto 0;display:flex;justify-content:space-between;align-items:center;}
.input-hint{font-size:8px;color:var(--t3);letter-spacing:1px;}
.char-count{font-size:8px;color:var(--t3);letter-spacing:1px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--bg1);border:1px solid var(--border);width:520px;max-height:80vh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.modal-title{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:var(--cyan);}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px;}
.modal-body::-webkit-scrollbar{width:2px;}
.modal-body::-webkit-scrollbar-thumb{background:var(--border);}
.hist-view-msg{margin-bottom:12px;padding:12px;background:var(--bg2);border:1px solid var(--border);}
.hist-view-role{font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.hist-view-role.mita{color:var(--cyan);}
.hist-view-role.user{color:var(--t2);}
.hist-view-text{font-size:11px;line-height:1.6;color:var(--t1);white-space:pre-wrap;word-break:break-word;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);padding:10px 16px;font-size:10px;letter-spacing:1px;z-index:300;animation:slideUp .3s ease;transition:opacity .3s;}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}
.toast.info{border-color:var(--cyan);color:var(--cyan);}
*{scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
</style>
</head>
<body>

<div class="screen" id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-eye">
        <svg viewBox="0 0 56 56" fill="none">
          <circle cx="28" cy="28" r="26" stroke="#00d4ff" stroke-width="1" opacity=".3"/>
          <circle cx="28" cy="28" r="18" stroke="#00d4ff" stroke-width="1" opacity=".5"/>
          <circle cx="28" cy="28" r="11" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
          <circle cx="28" cy="28" r="6" fill="#00d4ff" opacity=".9"><animate attributeName="r" values="6;7;6" dur="2s" repeatCount="indefinite"/></circle>
          <circle cx="28" cy="28" r="2.5" fill="white"/>
          <line x1="2" y1="28" x2="14" y2="28" stroke="#00d4ff" stroke-width="1" opacity=".4"/>
          <line x1="42" y1="28" x2="54" y2="28" stroke="#00d4ff" stroke-width="1" opacity=".4"/>
          <line x1="28" y1="2" x2="28" y2="14" stroke="#00d4ff" stroke-width="1" opacity=".4"/>
          <line x1="28" y1="42" x2="28" y2="54" stroke="#00d4ff" stroke-width="1" opacity=".4"/>
        </svg>
      </div>
      <div class="auth-title">MITA</div>
      <div class="auth-sub">Machine Intelligence Thinking Assistant</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchTab('register')">Criar Conta</button>
    </div>
    <div id="login-form">
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="seu@email.com"/></div>
      <div class="field"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••"/></div>
      <button class="auth-btn" onclick="doLogin()">ACESSAR SISTEMA</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="field"><label>Nome</label><input type="text" id="reg-name" placeholder="Seu nome"/></div>
      <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="seu@email.com"/></div>
      <div class="field"><label>Senha</label><input type="password" id="reg-pass" placeholder="mínimo 6 caracteres"/></div>
      <div class="field"><label>Confirmar Senha</label><input type="password" id="reg-pass2" placeholder="••••••••"/></div>
      <button class="auth-btn" onclick="doRegister()">CRIAR CONTA</button>
    </div>
    <div class="auth-msg" id="auth-msg"></div>
    <div class="auth-note">v3.0 · Dados salvos localmente · Sistema Seguro</div>
  </div>
</div>

<div class="modal-overlay hidden" id="hist-modal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modal-title">HISTÓRICO</span>
      <button class="icon-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <div class="h-brand">
      <div class="h-eye">
        <svg viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="9" stroke="#00d4ff" stroke-width="1"/>
          <circle cx="14" cy="14" r="5" fill="#00d4ff" opacity=".9"><animate attributeName="opacity" values=".9;1;.9" dur="2s" repeatCount="indefinite"/></circle>
          <circle cx="14" cy="14" r="2" fill="white"/>
        </svg>
      </div>
      <div><span class="h-name">MITA</span><span class="h-ver">v3.0</span></div>
    </div>
    <div class="h-status"><div class="status-dot"></div><span>ONLINE</span></div>
    <div class="h-user">
      <div class="h-avatar" id="h-avatar">M</div>
      <div class="h-username" id="h-username"></div>
      <button class="icon-btn danger" onclick="doLogout()" title="Sair">⎋</button>
    </div>
  </header>
  <div class="layout">
    <aside>
      <div class="sb-header">
        <span class="sb-title">Histórico</span>
        <button class="new-btn" onclick="newChat()">+ Novo</button>
      </div>
      <div class="sb-search"><input type="text" placeholder="Buscar conversas..." id="search-input" oninput="filterHistory()"/></div>
      <div class="sb-list" id="sb-list"></div>
      <div class="sb-footer">
        <div class="h-avatar" id="sb-avatar" style="width:24px;height:24px;font-size:9px;">M</div>
        <div class="sb-user-info">
          <div class="sb-user-name" id="sb-name"></div>
          <div class="sb-user-email" id="sb-email"></div>
        </div>
      </div>
    </aside>
    <main>
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="input-area">
        <div class="input-wrap">
          <textarea id="user-input" placeholder="Envie uma mensagem para a MITA..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this);updateCount()"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="input-hint">ENTER para enviar · SHIFT+ENTER nova linha</span>
          <span class="char-count" id="char-count">0 / 4000</span>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
const USERS_KEY='mita_users';
const SESS_KEY=uid=>'mita_sessions_'+uid;
const CUR_KEY='mita_current_user';
let currentUser=null,sessions=[],activeSession=null,isLoading=false;

function getUsers(){try{return JSON.parse(localStorage.getItem(USERS_KEY)||'{}')}catch(e){return{}}}
function saveUsers(u){localStorage.setItem(USERS_KEY,JSON.stringify(u))}
function hashPass(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}return h.toString(36)}

function switchTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('login-form').style.display=tab==='login'?'':'none';
  document.getElementById('register-form').style.display=tab==='register'?'':'none';
  setAuthMsg('');
}

function setAuthMsg(msg,type='error'){const el=document.getElementById('auth-msg');el.textContent=msg;el.className='auth-msg'+(msg?' '+type:'');}

function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim().toLowerCase();
  const pass=document.getElementById('reg-pass').value;
  const pass2=document.getElementById('reg-pass2').value;
  if(!name)return setAuthMsg('Informe seu nome');
  if(!email||!email.includes('@'))return setAuthMsg('Email inválido');
  if(pass.length<6)return setAuthMsg('Senha com mínimo 6 caracteres');
  if(pass!==pass2)return setAuthMsg('Senhas não conferem');
  const users=getUsers();
  if(users[email])return setAuthMsg('Email já cadastrado');
  const uid='u_'+Date.now();
  users[email]={uid,name,email,pass:hashPass(pass),created:Date.now()};
  saveUsers(users);
  setAuthMsg('Conta criada! Entrando...','success');
  setTimeout(()=>loginUser(users[email]),800);
}

function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value;
  if(!email)return setAuthMsg('Informe seu email');
  if(!pass)return setAuthMsg('Informe sua senha');
  const users=getUsers();
  const user=users[email];
  if(!user||user.pass!==hashPass(pass))return setAuthMsg('Email ou senha incorretos');
  loginUser(user);
}

document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('reg-pass2').addEventListener('keydown',e=>{if(e.key==='Enter')doRegister()});

function loginUser(user){
  currentUser=user;
  localStorage.setItem(CUR_KEY,JSON.stringify(user));
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  document.getElementById('h-avatar').textContent=user.name.slice(0,2).toUpperCase();
  document.getElementById('h-username').textContent=user.name;
  document.getElementById('sb-avatar').textContent=user.name.slice(0,2).toUpperCase();
  document.getElementById('sb-name').textContent=user.name;
  document.getElementById('sb-email').textContent=user.email;
  loadSessions();newChat();
}

function doLogout(){
  currentUser=null;localStorage.removeItem(CUR_KEY);
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('login-email').value='';
  document.getElementById('login-pass').value='';
  setAuthMsg('');switchTab('login');
}

function loadSessions(){try{sessions=JSON.parse(localStorage.getItem(SESS_KEY(currentUser.uid))||'[]')}catch(e){sessions=[]}renderHistory();}
function saveSessions(){localStorage.setItem(SESS_KEY(currentUser.uid),JSON.stringify(sessions.slice(0,50)));}

function newChat(){
  activeSession={id:'c_'+Date.now(),title:'Novo chat',messages:[],time:nowTime()};
  sessions.unshift(activeSession);saveSessions();renderHistory();clearChatUI();
}

function deleteSession(id,e){
  e.stopPropagation();
  if(!confirm('Apagar esta conversa?'))return;
  sessions=sessions.filter(s=>s.id!==id);saveSessions();
  if(activeSession&&activeSession.id===id)newChat();else renderHistory();
  showToast('Conversa apagada','info');
}

function viewSession(id,e){
  e.stopPropagation();
  const s=sessions.find(x=>x.id===id);if(!s)return;
  document.getElementById('modal-title').textContent=s.title.toUpperCase();
  const body=document.getElementById('modal-body');
  body.innerHTML=s.messages.length===0
    ?'<p style="color:var(--t3);font-size:11px;text-align:center;padding:20px">Sem mensagens</p>'
    :s.messages.map(m=>`<div class="hist-view-msg"><div class="hist-view-role ${m.role==='assistant'?'mita':'user'}">${m.role==='assistant'?'◈ MITA':'▸ VOCÊ'}</div><div class="hist-view-text">${esc(m.content)}</div></div>`).join('');
  document.getElementById('hist-modal').classList.remove('hidden');
}

function closeModal(){document.getElementById('hist-modal').classList.add('hidden');}

function filterHistory(){renderHistory(document.getElementById('search-input').value.toLowerCase());}

function renderHistory(filter=''){
  const list=document.getElementById('sb-list');
  const filtered=filter?sessions.filter(s=>s.title.toLowerCase().includes(filter)||s.messages.some(m=>m.content.toLowerCase().includes(filter))):sessions;
  if(filtered.length===0){list.innerHTML=`<div style="padding:16px;text-align:center;font-size:9px;color:var(--t3);letter-spacing:1px">${filter?'NENHUM RESULTADO':'SEM HISTÓRICO'}</div>`;return;}
  list.innerHTML='';
  filtered.forEach(s=>{
    const d=document.createElement('div');
    d.className='hist-item'+(s.id===activeSession?.id?' active':'');
    d.innerHTML=`<div class="hist-item-title">${esc(s.title)}</div><div class="hist-item-time">${s.time} · ${s.messages.length} msgs</div><div class="hist-actions"><button class="hist-act-btn view-btn" onclick="viewSession('${s.id}',event)" title="Ver">◈</button><button class="hist-act-btn" onclick="deleteSession('${s.id}',event)" title="Apagar">✕</button></div>`;
    d.onclick=()=>loadSession(s);list.appendChild(d);
  });
}

function loadSession(s){
  activeSession=s;document.getElementById('chat-msgs').innerHTML='';
  if(s.messages.length>0)s.messages.forEach(m=>renderMessage(m.role,m.content,false));
  else clearChatUI();
  renderHistory();scrollBottom();
}

function clearChatUI(){
  const hour=new Date().getHours();
  const greeting=hour<12?'Bom dia':hour<18?'Boa tarde':'Boa noite';
  document.getElementById('chat-msgs').innerHTML=`<div class="welcome">
    <div style="width:70px;height:70px;margin-bottom:20px"><svg viewBox="0 0 70 70" fill="none"><circle cx="35" cy="35" r="33" stroke="#00d4ff" stroke-width=".8" opacity=".2"/><circle cx="35" cy="35" r="24" stroke="#00d4ff" stroke-width=".8" opacity=".4"/><circle cx="35" cy="35" r="15" fill="none" stroke="#00d4ff" stroke-width="1.2"/><circle cx="35" cy="35" r="9" fill="#00d4ff" opacity=".9"><animate attributeName="r" values="9;11;9" dur="3s" repeatCount="indefinite"/></circle><circle cx="35" cy="35" r="3.5" fill="white"/></svg></div>
    <div class="w-title">MITA</div>
    <div class="w-sub">Machine Intelligence Thinking Assistant</div>
    <div class="w-greeting">${greeting}, ${esc(currentUser?.name||'usuário')}. Como posso ajudar?</div>
    <div class="suggestions">
      <div class="sug" onclick="suggest('Explique o que é inteligência artificial de forma simples')"><div class="sug-icon">◈</div><div class="sug-text">Explique IA de forma simples</div></div>
      <div class="sug" onclick="suggest('Gere um código Python para ordenar uma lista')"><div class="sug-icon">⟨/⟩</div><div class="sug-text">Código Python para ordenar lista</div></div>
      <div class="sug" onclick="suggest('Quais são as melhores práticas de segurança web?')"><div class="sug-icon">⬢</div><div class="sug-text">Melhores práticas de segurança web</div></div>
      <div class="sug" onclick="suggest('Me ajude a criar um plano de estudos para programação')"><div class="sug-icon">⬡</div><div class="sug-text">Plano de estudos para programação</div></div>
    </div>
  </div>`;
}

function renderMessage(role,content,animate=true){
  document.querySelector('.welcome')?.remove();
  const msgs=document.getElementById('chat-msgs');
  const wrap=document.createElement('div');
  wrap.className='msg-wrap';if(!animate)wrap.style.animation='none';
  const isMita=role==='assistant';
  const avInner=isMita
    ?`<svg viewBox="0 0 30 30" fill="none" width="18" height="18"><circle cx="15" cy="15" r="8" stroke="#00d4ff" stroke-width="1"/><circle cx="15" cy="15" r="4" fill="#00d4ff"/><circle cx="15" cy="15" r="1.5" fill="white"/></svg>`
    :`<span style="font-size:11px;font-weight:700">${esc(currentUser?.name?.slice(0,1).toUpperCase()||'U')}</span>`;
  wrap.innerHTML=`<div class="msg"><div class="msg-av ${isMita?'mita':'user'}">${avInner}</div><div class="msg-body"><div class="msg-head"><span class="msg-name ${isMita?'mita':'user'}">${isMita?'MITA':esc(currentUser?.name||'Você')}</span><span class="msg-time">${nowTime()}</span></div><div class="msg-text">${fmt(content)}</div></div></div>`;
  msgs.appendChild(wrap);
  wrap.querySelectorAll('pre').forEach(pre=>{
    const btn=document.createElement('button');btn.className='copy-btn';btn.textContent='COPIAR';
    btn.onclick=()=>{navigator.clipboard.writeText(pre.querySelector('code')?.textContent||pre.textContent);btn.textContent='COPIADO!';setTimeout(()=>btn.textContent='COPIAR',2000);};
    pre.appendChild(btn);
  });
  scrollBottom();
}

function showTyping(){
  const msgs=document.getElementById('chat-msgs');
  const d=document.createElement('div');d.id='typing';d.className='msg-wrap';
  d.innerHTML=`<div class="msg"><div class="msg-av mita"><svg viewBox="0 0 30 30" fill="none" width="18" height="18"><circle cx="15" cy="15" r="8" stroke="#00d4ff" stroke-width="1"/><circle cx="15" cy="15" r="4" fill="#00d4ff"/><circle cx="15" cy="15" r="1.5" fill="white"/></svg></div><div class="msg-body"><div class="msg-head"><span class="msg-name mita">MITA</span></div><div class="typing-ind"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
  msgs.appendChild(d);scrollBottom();
}

function hideTyping(){document.getElementById('typing')?.remove();}
function scrollBottom(){const m=document.getElementById('chat-msgs');m.scrollTop=m.scrollHeight;}
function suggest(text){document.getElementById('user-input').value=text;sendMessage();}

async function sendMessage(){
  if(isLoading)return;
  const input=document.getElementById('user-input');
  const text=input.value.trim();if(!text)return;
  input.value='';autoResize(input);updateCount();
  renderMessage('user',text);
  if(!activeSession)newChat();
  activeSession.messages.push({role:'user',content:text});
  if(activeSession.title==='Novo chat')activeSession.title=text.slice(0,35)+(text.length>35?'...':'');
  saveSessions();renderHistory();
  isLoading=true;document.getElementById('send-btn').disabled=true;showTyping();

  const memCtx=buildMemoryContext();
  const msgs=[
    ...(memCtx?[{role:'user',content:memCtx},{role:'assistant',content:'Entendido, tenho esse contexto em memória.'}]:[]),
    ...activeSession.messages.map(m=>({role:m.role,content:m.content}))
  ];

  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msgs})});
    const data=await res.json();hideTyping();
    if(data.error){renderMessage('assistant',`Erro: ${data.error}`);}
    else{renderMessage('assistant',data.reply);activeSession.messages.push({role:'assistant',content:data.reply});saveSessions();}
  }catch(err){hideTyping();renderMessage('assistant',`Falha de conexão: ${err.message}`);}
  isLoading=false;document.getElementById('send-btn').disabled=false;document.getElementById('user-input').focus();
}

function buildMemoryContext(){
  const recent=sessions.filter(s=>s.id!==activeSession?.id&&s.messages.length>0).slice(0,4);
  if(recent.length===0)return null;
  const summary=recent.map(s=>`[${s.title}]: ${s.messages.slice(-2).map(m=>`${m.role==='user'?'Usuário':'MITA'}: ${m.content.slice(0,100)}`).join(' | ')}`).join('\n');
  return `MEMÓRIA DE CONVERSAS ANTERIORES DO USUÁRIO ${currentUser?.name}:\n${summary}\n\nUse esse contexto para personalizar respostas quando relevante.`;
}

function fmt(text){
  text=text.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${esc(c.trim())}</code></pre>`);
  text=text.replace(/`([^`]+)`/g,(_,c)=>`<code>${esc(c)}</code>`);
  text=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\*(.*?)\*/g,'<em>$1</em>');
  text=text.replace(/\n/g,'<br>');
  return text;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function nowTime(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,160)+'px';}
function updateCount(){document.getElementById('char-count').textContent=`${document.getElementById('user-input').value.length} / 4000`;}

function showToast(msg,type='info'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2500);
}

window.addEventListener('load',()=>{
  try{
    const saved=JSON.parse(localStorage.getItem(CUR_KEY));
    if(saved?.uid){const users=getUsers();const user=Object.values(users).find(u=>u.uid===saved.uid);if(user){loginUser(user);return;}}
  }catch(e){}
});
</script>
