<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MITA — Machine Intelligence Thinking Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #020408;
    --bg-panel: #060d18;
    --bg-card: #0a1628;
    --bg-input: #0d1f38;
    --accent-cyan: #00d4ff;
    --accent-blue: #0066ff;
    --text-primary: #e8f4ff;
    --text-secondary: #6a9fd8;
    --text-dim: #2a4a6b;
    --border: #0f2a4a;
    --border-active: #00d4ff33;
    --error: #ff4455;
    --success: #00ff88;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(0,100,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,212,255,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
    animation: nebula 15s ease-in-out infinite alternate;
  }
  @keyframes nebula { 0% { transform: translate(0,0); } 100% { transform: translate(2%,2%); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes messageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.8); } }
  @keyframes typingDot { 0%,80%,100% { transform:scale(0.6); opacity:0.4; } 40% { transform:scale(1); opacity:1; } }
  @keyframes scanLine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

  /* LOGIN */
  #login-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-deep);
  }
  .login-box {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 48px 56px;
    width: 420px;
    position: relative;
    overflow: hidden;
  }
  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
    animation: scanLine 3s linear infinite;
  }
  .login-logo { text-align: center; margin-bottom: 36px; }
  .mita-eye { width: 64px; height: 64px; margin: 0 auto 16px; }
  .login-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px; font-weight: 900;
    letter-spacing: 6px; color: var(--accent-cyan);
    text-shadow: 0 0 30px rgba(0,212,255,0.5);
  }
  .login-sub { font-size: 10px; letter-spacing: 3px; color: var(--text-secondary); margin-top: 4px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 10px; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; }
  .field input {
    width: 100%;
    background: var(--bg-input); border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    padding: 12px 16px; border-radius: 2px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 1px var(--accent-cyan), 0 0 20px rgba(0,212,255,0.1); }
  .btn-login {
    width: 100%;
    background: transparent; border: 1px solid var(--accent-cyan);
    color: var(--accent-cyan);
    font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 4px; padding: 14px; cursor: pointer;
    border-radius: 2px; margin-top: 8px;
    transition: all 0.2s; text-transform: uppercase;
  }
  .btn-login:hover { background: var(--accent-cyan); color: var(--bg-deep); box-shadow: 0 0 30px rgba(0,212,255,0.4); }
  .login-note { text-align: center; font-size: 10px; color: var(--text-dim); margin-top: 20px; letter-spacing: 1px; }

  /* APP */
  #app { display: none; flex-direction: column; height: 100vh; position: relative; z-index: 1; }
  #app.visible { display: flex; animation: fadeIn 0.4s ease; }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px;
    background: var(--bg-panel); border-bottom: 1px solid var(--border);
    flex-shrink: 0; position: relative;
  }
  header::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-cyan)33, transparent);
  }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-eye { width: 28px; height: 28px; }
  .brand-name { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; letter-spacing: 4px; color: var(--accent-cyan); text-shadow: 0 0 20px rgba(0,212,255,0.4); }
  .brand-ver { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); margin-left: 4px; align-self: flex-end; margin-bottom: 2px; }
  .header-status { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-secondary); letter-spacing: 1px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s ease-in-out infinite; }
  .icon-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
    width: 32px; height: 32px; border-radius: 2px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; font-size: 14px;
  }
  .icon-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); box-shadow: 0 0 12px rgba(0,212,255,0.2); }

  /* LAYOUT */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  aside {
    width: 220px; background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-title { font-size: 9px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }
  .new-chat-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px;
    padding: 4px 8px; cursor: pointer; border-radius: 2px; transition: all 0.2s;
  }
  .new-chat-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
  .chat-history { flex: 1; overflow-y: auto; padding: 8px; }
  .chat-history::-webkit-scrollbar { width: 3px; }
  .chat-history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .history-item { padding: 10px 12px; border-radius: 2px; cursor: pointer; border: 1px solid transparent; margin-bottom: 4px; transition: all 0.15s; }
  .history-item:hover { background: var(--bg-card); border-color: var(--border); }
  .history-item.active { background: var(--bg-card); border-color: var(--border-active); }
  .history-item-title { font-size: 11px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-item-time { font-size: 9px; color: var(--text-dim); margin-top: 2px; }
  .sidebar-user { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .user-avatar { width: 28px; height: 28px; border-radius: 2px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; }
  .user-name { font-size: 11px; color: var(--text-secondary); }
  .logout-btn { margin-left: auto; background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 12px; transition: color 0.2s; }
  .logout-btn:hover { color: var(--error); }

  /* MAIN CHAT */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 32px 0; }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome */
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 40px; text-align: center; }
  .welcome-title { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900; letter-spacing: 8px; color: var(--accent-cyan); text-shadow: 0 0 40px rgba(0,212,255,0.4); margin-bottom: 8px; }
  .welcome-sub { font-size: 11px; letter-spacing: 3px; color: var(--text-secondary); margin-bottom: 40px; }
  .suggestions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 480px; width: 100%; }
  .suggestion-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 2px; padding: 14px; cursor: pointer; text-align: left; transition: all 0.2s; }
  .suggestion-card:hover { border-color: var(--accent-cyan); box-shadow: 0 0 20px rgba(0,212,255,0.1); transform: translateY(-1px); }
  .suggestion-icon { font-size: 18px; margin-bottom: 6px; }
  .suggestion-text { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }

  /* Messages */
  .message-wrap { max-width: 780px; margin: 0 auto; padding: 0 24px; animation: messageIn 0.3s ease; }
  .message { display: flex; gap: 14px; margin-bottom: 28px; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
  .msg-avatar.mita { background: linear-gradient(135deg, #001a33, #003366); border: 1px solid var(--accent-cyan)44; }
  .msg-avatar.user { background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); }
  .msg-content { flex: 1; }
  .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .msg-name { font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
  .msg-name.mita { color: var(--accent-cyan); }
  .msg-name.user { color: var(--text-secondary); }
  .msg-time { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }
  .msg-text { font-size: 13px; line-height: 1.7; color: var(--text-primary); }
  .msg-text code { background: var(--bg-card); border: 1px solid var(--border); border-radius: 2px; padding: 1px 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent-cyan); }
  .msg-text pre { background: var(--bg-card); border: 1px solid var(--border); border-left: 2px solid var(--accent-cyan); border-radius: 2px; padding: 16px; margin: 12px 0; overflow-x: auto; font-size: 12px; line-height: 1.6; }
  .msg-text pre code { background: none; border: none; padding: 0; color: var(--text-primary); }
  .msg-text p { margin-bottom: 8px; }
  .msg-text ul, .msg-text ol { padding-left: 20px; margin-bottom: 8px; }
  .msg-text li { margin-bottom: 4px; }
  .msg-text strong { color: var(--accent-cyan); font-weight: 500; }

  /* Typing */
  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-cyan); animation: typingDot 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  /* INPUT */
  .input-area { border-top: 1px solid var(--border); padding: 20px 24px; background: var(--bg-panel); position: relative; }
  .input-area::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-cyan)22, transparent); }
  .input-wrapper { max-width: 780px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  textarea { width: 100%; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 13px; padding: 14px 16px; border-radius: 2px; outline: none; resize: none; min-height: 48px; max-height: 160px; line-height: 1.5; transition: border-color 0.2s, box-shadow 0.2s; }
  textarea::placeholder { color: var(--text-dim); }
  textarea:focus { border-color: var(--accent-cyan)66; box-shadow: 0 0 0 1px var(--accent-cyan)22; }
  .send-btn { width: 48px; height: 48px; background: var(--accent-cyan); border: none; border-radius: 2px; color: var(--bg-deep); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .send-btn:hover { background: white; box-shadow: 0 0 20px rgba(0,212,255,0.5); }
  .send-btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; box-shadow: none; }
  .send-btn svg { width: 18px; height: 18px; }
  .input-footer { max-width: 780px; margin: 8px auto 0; display: flex; justify-content: space-between; }
  .input-hint { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }
  .char-count { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="mita-eye">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
          <circle cx="32" cy="32" r="22" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
          <circle cx="32" cy="32" r="14" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
          <circle cx="32" cy="32" r="8" fill="#00d4ff" opacity="0.8">
            <animate attributeName="r" values="8;9;8" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="32" cy="32" r="3" fill="white"/>
          <line x1="2" y1="32" x2="18" y2="32" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
          <line x1="46" y1="32" x2="62" y2="32" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
          <line x1="32" y1="2" x2="32" y2="18" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
          <line x1="32" y1="46" x2="32" y2="62" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
        </svg>
      </div>
      <div class="login-title">MITA</div>
      <div class="login-sub">Machine Intelligence Thinking Assistant</div>
    </div>
    <div class="field">
      <label>Identificação</label>
      <input type="text" id="login-user" placeholder="seu nome ou usuário" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Código de Acesso</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="off"/>
    </div>
    <button class="btn-login" onclick="doLogin()">INICIAR SESSÃO</button>
    <div class="login-note">v2.0 · Online via Vercel · Sistema Seguro</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-brand">
      <div class="header-eye">
        <svg viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="10" stroke="#00d4ff" stroke-width="1.2"/>
          <circle cx="16" cy="16" r="5" fill="#00d4ff" opacity="0.8">
            <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="16" cy="16" r="2" fill="white"/>
        </svg>
      </div>
      <div>
        <span class="brand-name">MITA</span>
        <span class="brand-ver">v2.0</span>
      </div>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      <span>SISTEMA ATIVO</span>
    </div>
    <div>
      <button class="icon-btn" onclick="clearChat()" title="Limpar chat">✕</button>
    </div>
  </header>

  <div class="layout">
    <aside>
      <div class="sidebar-header">
        <span class="sidebar-title">Histórico</span>
        <button class="new-chat-btn" onclick="newChat()">+ Novo</button>
      </div>
      <div class="chat-history" id="chat-history"></div>
      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">U</div>
        <div class="user-name" id="user-display">Usuário</div>
        <button class="logout-btn" onclick="doLogout()" title="Sair">⎋</button>
      </div>
    </aside>

    <main>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="user-input" placeholder="Envie uma mensagem para a MITA..." rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this); updateCount()"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="input-hint">ENTER para enviar · SHIFT+ENTER para nova linha</span>
          <span class="char-count" id="char-count">0 / 4000</span>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
let currentUser = '';
let sessions = [];
let activeSession = null;
let isLoading = false;

function makeWelcome() {
  return `<div class="welcome" id="welcome-screen">
    <div style="width:80px;height:80px;margin-bottom:24px">
      <svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="38" stroke="#00d4ff" stroke-width="1" opacity="0.2"/><circle cx="40" cy="40" r="28" stroke="#00d4ff" stroke-width="1" opacity="0.4"/><circle cx="40" cy="40" r="18" fill="none" stroke="#00d4ff" stroke-width="1.5"/><circle cx="40" cy="40" r="10" fill="#00d4ff" opacity="0.9"><animate attributeName="r" values="10;12;10" dur="3s" repeatCount="indefinite"/></circle><circle cx="40" cy="40" r="4" fill="white"/></svg>
    </div>
    <div class="welcome-title">MITA</div>
    <div class="welcome-sub">Machine Intelligence Thinking Assistant</div>
    <div class="suggestions">
      <div class="suggestion-card" onclick="suggest('Gere um código Python para ordenar uma lista')">
        <div class="suggestion-icon">⟨/⟩</div>
        <div class="suggestion-text">Gerar código Python para ordenar lista</div>
      </div>
      <div class="suggestion-card" onclick="suggest('Explique o que é machine learning de forma simples')">
        <div class="suggestion-icon">◈</div>
        <div class="suggestion-text">Explique machine learning de forma simples</div>
      </div>
      <div class="suggestion-card" onclick="suggest('Como criar uma API REST com Node.js?')">
        <div class="suggestion-icon">⬡</div>
        <div class="suggestion-text">Como criar uma API REST com Node.js?</div>
      </div>
      <div class="suggestion-card" onclick="suggest('Quais são as melhores práticas de segurança web?')">
        <div class="suggestion-icon">⬢</div>
        <div class="suggestion-text">Melhores práticas de segurança web</div>
      </div>
    </div>
  </div>`;
}

function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  if (!user) { alert('Informe seu nome/usuário'); return; }
  if (!pass) { alert('Informe um código de acesso'); return; }
  currentUser = user;
  document.getElementById('user-avatar').textContent = user.slice(0,2).toUpperCase();
  document.getElementById('user-display').textContent = user;
  const ls = document.getElementById('login-screen');
  ls.style.transition = 'opacity 0.4s';
  ls.style.opacity = '0';
  setTimeout(() => { ls.style.display = 'none'; document.getElementById('app').classList.add('visible'); }, 400);
  loadSessions();
  newChat();
}

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  currentUser = '';
  document.getElementById('app').classList.remove('visible');
  const ls = document.getElementById('login-screen');
  ls.style.display = 'flex'; ls.style.opacity = '1';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

function loadSessions() {
  try { sessions = JSON.parse(localStorage.getItem('mita_sessions') || '[]'); } catch(e) { sessions = []; }
  renderHistory();
}

function saveSessions() {
  try { localStorage.setItem('mita_sessions', JSON.stringify(sessions.slice(0,20))); } catch(e) {}
}

function newChat() {
  activeSession = { id: Date.now(), title: 'Nova sessão', messages: [], time: new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}) };
  sessions.unshift(activeSession);
  saveSessions();
  renderHistory();
  clearChatUI();
}

function renderHistory() {
  const hist = document.getElementById('chat-history');
  hist.innerHTML = '';
  sessions.forEach(s => {
    const d = document.createElement('div');
    d.className = 'history-item' + (s.id === activeSession?.id ? ' active' : '');
    d.innerHTML = `<div class="history-item-title">${esc(s.title)}</div><div class="history-item-time">${s.time}</div>`;
    d.onclick = () => loadSession(s);
    hist.appendChild(d);
  });
}

function loadSession(s) {
  activeSession = s;
  clearChatUI();
  s.messages.forEach(m => renderMessage(m.role, m.content, false));
  renderHistory();
  scrollBottom();
}

function clearChatUI() {
  document.getElementById('chat-messages').innerHTML = makeWelcome();
}

function clearChat() {
  if (activeSession) { activeSession.messages = []; activeSession.title = 'Nova sessão'; saveSessions(); }
  clearChatUI();
  renderHistory();
}

function suggest(text) { document.getElementById('user-input').value = text; sendMessage(); }

function renderMessage(role, content, animate = true) {
  const w = document.getElementById('welcome-screen');
  if (w) w.remove();
  const msgs = document.getElementById('chat-messages');
  const wrap = document.createElement('div');
  wrap.className = 'message-wrap';
  if (!animate) wrap.style.animation = 'none';
  const isMita = role === 'assistant';
  const now = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  const avatarInner = isMita
    ? `<svg viewBox="0 0 32 32" fill="none" width="20" height="20"><circle cx="16" cy="16" r="8" stroke="#00d4ff" stroke-width="1.2"/><circle cx="16" cy="16" r="4" fill="#00d4ff"/><circle cx="16" cy="16" r="1.5" fill="white"/></svg>`
    : `<span style="font-size:14px;font-weight:700">${currentUser.slice(0,1).toUpperCase()}</span>`;
  wrap.innerHTML = `<div class="message">
    <div class="msg-avatar ${isMita?'mita':'user'}">${avatarInner}</div>
    <div class="msg-content">
      <div class="msg-header">
        <span class="msg-name ${isMita?'mita':'user'}">${isMita?'MITA':esc(currentUser)}</span>
        <span class="msg-time">${now}</span>
      </div>
      <div class="msg-text">${fmt(content)}</div>
    </div>
  </div>`;
  msgs.appendChild(wrap);
  scrollBottom();
}

function fmt(text) {
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) => `<pre><code>${esc(c.trim())}</code></pre>`);
  text = text.replace(/`([^`]+)`/g, (_,c) => `<code>${esc(c)}</code>`);
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showTyping() {
  const msgs = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.id = 'typing'; d.className = 'message-wrap';
  d.innerHTML = `<div class="message"><div class="msg-avatar mita"><svg viewBox="0 0 32 32" fill="none" width="20" height="20"><circle cx="16" cy="16" r="8" stroke="#00d4ff" stroke-width="1.2"/><circle cx="16" cy="16" r="4" fill="#00d4ff"/><circle cx="16" cy="16" r="1.5" fill="white"/></svg></div><div class="msg-content"><div class="msg-header"><span class="msg-name mita">MITA</span></div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
  msgs.appendChild(d);
  scrollBottom();
}

function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }
function scrollBottom() { const m = document.getElementById('chat-messages'); m.scrollTop = m.scrollHeight; }

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  autoResize(input);
  updateCount();
  renderMessage('user', text);
  if (!activeSession) newChat();
  activeSession.messages.push({ role: 'user', content: text });
  if (activeSession.title === 'Nova sessão') activeSession.title = text.slice(0,30) + (text.length > 30 ? '...' : '');
  saveSessions();
  renderHistory();
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: activeSession.messages.map(m => ({ role: m.role, content: m.content })) })
    });
    const data = await res.json();
    hideTyping();
    if (data.error) {
      renderMessage('assistant', `⚠ Erro: ${data.error}`);
    } else {
      renderMessage('assistant', data.reply);
      activeSession.messages.push({ role: 'assistant', content: data.reply });
      saveSessions();
    }
  } catch(err) {
    hideTyping();
    renderMessage('assistant', `⚠ Falha de conexão: ${err.message}`);
  }
  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('user-input').focus();
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 160) + 'px'; }
function updateCount() { document.getElementById('char-count').textContent = `${document.getElementById('user-input').value.length} / 4000`; }
</script>
</body>
</html>
